name: CI

# Runs once the repo is on GitHub (the standing remote dependency). Until then,
# every job here is runnable locally: `pip install -e .`, `cohort validate
# ./canonical`, `shellcheck installer/bootstrap.sh`, `pytest`.
on:
  # Run once per change, not twice: a PR is validated by the `pull_request` event,
  # and `push` fires only on the default branch (post-merge). Triggering `push` on
  # every branch too made each PR spawn a duplicate run whose slower (Windows) half
  # lingered `in_progress` and kept the PR `BLOCKED`.
  push:
    branches: [master]
  pull_request:

# Supersede in-flight runs of the same ref: a new push cancels the older run
# instead of leaving it pending against branch protection.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      # Python UTF-8 mode: make open()/read_text()/subprocess text decoding default
      # to UTF-8 so the suite isn't at the mercy of the Windows console codepage
      # (cp1252). The CLI itself is independently UTF-8-safe (cli._force_utf8_io).
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache pip's download cache, keyed on the dependency spec, so the
          # per-run `pip install` reuses wheels instead of re-downloading. The
          # Windows job is the long pole; this shaves the install step on both.
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with dev extras (pytest)
        run: pip install -e ".[dev]"
      - name: shellcheck (CI-required; locally skip-when-absent)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck installer/bootstrap.sh
      - name: Schema lint (zero-tolerance)
        run: cohort validate ./canonical
      - name: Windows entry-point smoke (copy-mode default, changes nothing)
        if: runner.os == 'Windows'
        run: cohort recompile --ide claude --source . --dry-run
      - name: Full suite + golden/parity + install-smoke + e2e + YAML-safety lint
        run: python -m pytest -q
